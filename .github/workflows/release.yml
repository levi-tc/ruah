# Auto-publish to npm on version tag push
# Usage: npm version patch/minor/major → git push --tags
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ruah-orch

      - uses: actions/checkout@v4
        with:
          repository: ruah-dev/ruah-cli
          path: ruah-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
        working-directory: ruah-orch/packages/core

      - run: npm ci
        working-directory: ruah-cli

      - run: npm ci
        working-directory: ruah-orch

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: ruah-orch/packages/core

      - name: Lint
        run: npm run lint
        working-directory: ruah-orch

      - name: Test
        run: npm test
        working-directory: ruah-orch

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: ruah-orch

      - uses: actions/checkout@v4
        with:
          repository: ruah-dev/ruah-cli
          path: ruah-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
        working-directory: ruah-orch/packages/core

      - run: npm ci
        working-directory: ruah-cli

      - run: npm ci
        working-directory: ruah-orch

      - name: Wait for cli package to be visible
        run: |
          CLI_VERSION="$(node -p "require('../ruah-cli/package.json').version")"
          for attempt in {1..20}; do
            if npm view "@ruah-dev/cli@$CLI_VERSION" version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 15
          done
          echo "Timed out waiting for @ruah-dev/cli@$CLI_VERSION to be available on npm."
          exit 1
        working-directory: ruah-orch

      - name: Rewrite root manifest for registry publish
        run: |
          CLI_VERSION="$(node -p "require('../ruah-cli/package.json').version")"
          CORE_VERSION="$(node -p "require('./packages/core/package.json').version")"
          CLI_VERSION="$CLI_VERSION" CORE_VERSION="$CORE_VERSION" node <<'EOF'
          const fs = require("node:fs");
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          packageJson.dependencies["@ruah-dev/cli"] = `^${process.env.CLI_VERSION}`;
          packageJson.dependencies["@ruah-dev/orch-core"] = `^${process.env.CORE_VERSION}`;
          fs.writeFileSync("package.json", JSON.stringify(packageJson, null, "\t") + "\n");
          EOF
        working-directory: ruah-orch

      - name: Determine npm dist-tag
        id: npm-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "dist_tag=${VERSION#*-}" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ruah-orch

      - name: Publish with provenance
        run: npm publish --access public --provenance --tag "${{ steps.npm-tag.outputs.dist_tag }}" --ignore-scripts
        working-directory: ruah-orch
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ruah-orch
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE_FLAG=""

          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "ruah $TAG" \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo '')" \
            $PRERELEASE_FLAG \
            --verify-tag
        working-directory: ruah-orch
